<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammed Ajmal N | Resume</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #000000;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
     }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 300px;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-color);
            margin-bottom: 20px;
        }

        .sidebar h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .sidebar p {
            color: #aaaaaa;
            font-size: 0.85rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #cccccc;
            text-align: left;
            padding: 12px 15px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--bg-color);
            border-color: rgba(255, 255, 255, 0.2);
            padding-left: 20px;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
            position: relative;
        }

        .typewriter-container {
            max-width: 800px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-muted);
        }

        /* Typed elements styling */
        .typewriter-container h2 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            padding-bottom: 10px;
        }

        .typewriter-container h3 {
            font-size: 1.4rem;
            color: var(--text-main);
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .typewriter-container h4 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .typewriter-container ul {
            list-style-type: none;
            margin-bottom: 20px;
        }

        .typewriter-container ul li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
        }

        .typewriter-container ul li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--text-main);
            font-weight: bold;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .skill-tag {
            padding: 8px 20px;
            border: 1px solid var(--text-main);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Blinking Cursor Effect */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.1em;
            background-color: var(--text-main);
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }
            .sidebar {
                width: 100%;
                padding: 30px 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .main-content {
                padding: 30px 20px;
            }
            .nav-menu {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .nav-btn {
                flex: 1;
                justify-content: center;
                padding: 10px;
            }
            .nav-btn:hover, .nav-btn.active {
                padding-left: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <!-- Make sure profile.jpg is in the same folder -->
        <img src="profile.jpg" alt="Muhammed Ajmal" class="profile-img" onerror="this.src='https://via.placeholder.com/120'">
        <h1>Muhammed Ajmal</h1>
        <p>Logistics Student | Retail Pro | E-Commerce Entrepreneur</p>

        <div class="nav-menu">
            <button class="nav-btn active" onclick="loadContent('home', this)"><i class="fas fa-home"></i> Home</button>
            <button class="nav-btn" onclick="loadContent('about', this)"><i class="fas fa-user"></i> About Me</button>
            <button class="nav-btn" onclick="loadContent('experience', this)"><i class="fas fa-briefcase"></i> Experience</button>
            <button class="nav-btn" onclick="loadContent('skills', this)"><i class="fas fa-bolt"></i> Skills & Ed.</button>
            <button class="nav-btn" onclick="loadContent('contact', this)"><i class="fas fa-envelope"></i> Contact</button>
        </div>
    </div>

    <!-- Main Content where text types out -->
    <div class="main-content">
        <div id="typewriter-output" class="typewriter-container"></div>
    </div>

    <script>
        // Content Database
        const contentData = {
            home: `
                <h2>Welcome.</h2>
                <p>Hello, I'm <strong>Muhammed Ajmal N</strong>.</p>
                <br>
                <p>I build premium e-commerce experiences and specialize in logistics & supply chain management.</p>
                <br>
                <p><i>"Focused on Growth, Operations Excellence, and Business Innovation."</i></p>
                <br>
                <p>Select an option from the menu to know more about my professional journey.</p>
            `,
            about: `
                <h2>About Me</h2>
                <p>I am an aspiring Logistics & Supply Chain Management professional with hands-on practical experience in retail operations, customer service, and e-commerce business management.</p>
                <br>
                <p>Through my work at Lulu Hypermarket and my entrepreneurial venture <strong>VESTIGA</strong>, I have developed strong skills in customer relationship management, inventory handling, sales operations, and digital commerce.</p>
                <br>
                <p><strong>My Goal:</strong> To build a successful career in Logistics, Retail Operations, and Business Development while continuously learning and contributing to organizational growth.</p>
            `,
            experience: `
                <h2>Professional Experience</h2>
                
                <h3>Founder & Brand Manager</h3>
                <h4>VESTIGA | Premium Fashion & Lifestyle Brand</h4>
                <ul>
                    <li>Founded and managed an e-commerce brand focused on luxury fashion accessories.</li>
                    <li>Built brand identity and digital presence from the ground up.</li>
                    <li>Coordinated sourcing, inventory planning, and order fulfillment.</li>
                    <li>Executed social media and marketplace growth strategies.</li>
                </ul>

                <h3>Sales Associate</h3>
                <h4>Lulu Hypermarket</h4>
                <ul>
                    <li>Delivered excellent customer service and product guidance.</li>
                    <li>Assisted in inventory monitoring and stock replenishment.</li>
                    <li>Maintained premium visual merchandising standards.</li>
                    <li>Supported daily retail operations in a high-volume environment.</li>
                </ul>
            `,
            skills: `
                <h2>Skills & Education</h2>
                
                <h3>Technical Competencies</h3>
                <div class="skills-grid">
                    <span class="skill-tag">Tally Prime</span>
                    <span class="skill-tag">MS Excel</span>
                    <span class="skill-tag">Inventory Management</span>
                    <span class="skill-tag">E-Commerce Operations</span>
                    <span class="skill-tag">Supply Chain Fundamentals</span>
                </div>

                <h3>Professional Skills</h3>
                <div class="skills-grid">
                    <span class="skill-tag">Customer Relationship</span>
                    <span class="skill-tag">Team Collaboration</span>
                    <span class="skill-tag">Problem Solving</span>
                    <span class="skill-tag">Retail Operations</span>
                </div>

                <br>
                <h3>Education</h3>
                <ul>
                    <li><strong>Diploma in Logistics & Supply Chain Management</strong> (Currently Pursuing)</li>
                    <li><strong>Higher Secondary Education</strong> (Currently Pursuing)</li>
                </ul>
            `,
            contact: `
                <h2>Get In Touch</h2>
                <p>I'm always open to discussing new opportunities, business ideas, or logistics strategies.</p>
                <br>
                <ul>
                    <li><strong>Location:</strong> Attingal, Thiruvananthapuram, Kerala, India</li>
                    <li><strong>Phone:</strong> +91 9074988458</li>
                    <li><strong>Email:</strong> vestiga.in@gmail.com</li>
                </ul>
                <br>
                <p>Looking forward to connecting with you!</p>
            `
        };

        let typingTimeout;

        // The Typing Engine
        function typeHTML(element, html, speed) {
            clearTimeout(typingTimeout); // Stop any previous typing
            element.innerHTML = '';
            let i = 0;
            let isTag = false;
            let text = '';

            function type() {
                if (i < html.length) {
                    // Instantly process HTML tags so layout doesn't break
                    if (html.charAt(i) === '<') isTag = true;
                    text += html.charAt(i);
                    if (html.charAt(i) === '>') isTag = false;

                    element.innerHTML = text + '<span class="cursor"></span>';
                    i++;

                    if (isTag) {
                        type(); // Skip delay for HTML brackets
                    } else {
                        // Very fast typing speed for smooth feel
                        typingTimeout = setTimeout(type, speed);
                    }
                } else {
                    element.innerHTML = text + '<span class="cursor"></span>'; // Leave cursor at the end
                }
            }
            type();
        }

        // Handle Menu Clicks
        function loadContent(section, btnElement) {
            // Update active button styling
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            // Start typing effect (speed: 10ms per character)
            const outputDiv = document.getElementById('typewriter-output');
            typeHTML(outputDiv, contentData[section], 10);
        }

        // Load Home section on page load
        window.onload = () => {
            loadContent('home', document.querySelector('.nav-btn.active'));
        };
    </script>
</body>
</html>
